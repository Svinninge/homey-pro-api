<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homey Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: #16213e;
      border-bottom: 2px solid #0f3460;
    }
    .header-left { display: flex; flex-direction: column; gap: 4px; }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #7ec8e3;
    }
    header h1 span { color: #f0f0f0; }
    .header-info {
      font-size: 13px;
      color: #b0b0b0;
    }
    .header-info span { color: #e0e0e0; font-weight: 500; }
    .logout-btn {
      background: none;
      border: 2px solid #0f3460;
      color: #e0e0e0;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
    }
    .logout-btn:hover { border-color: #7ec8e3; color: #7ec8e3; }

    /* ── Login screen ───────────────────── */
    .login-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .login-screen h2 { font-size: 32px; color: #7ec8e3; }
    .login-screen p { color: #d0d0d0; font-size: 18px; }
    .login-btn {
      background: #238636;
      color: white;
      border: none;
      padding: 16px 36px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      font-weight: 700;
    }
    .login-btn:hover { background: #2ea043; }

    /* ── Chat area ──────────────────────── */
    .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 16px;
    }
    .message.user {
      align-self: flex-end;
      background: #1f6feb;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: #1e2a4a;
      border: 1px solid #0f3460;
      color: #f0f0f0;
      border-bottom-left-radius: 4px;
    }

    /* ── Markdown inside messages ────────── */
    .message.assistant table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 15px;
    }
    .message.assistant th, .message.assistant td {
      border: 1px solid #0f3460;
      padding: 8px 12px;
      text-align: left;
    }
    .message.assistant th { background: #16213e; font-weight: 600; color: #e0e0e0; }
    .message.assistant td { color: #e0e0e0; }
    .message.assistant code {
      background: #16213e;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 15px;
      color: #e0e0e0;
    }
    .message.assistant pre {
      background: #16213e;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .message.assistant pre code { padding: 0; background: none; }
    .message.assistant ul, .message.assistant ol { padding-left: 20px; margin: 6px 0; }
    .message.assistant p { margin: 4px 0; }
    .message.assistant strong { color: #7ec8e3; }

    /* ── Loading indicator ──────────────── */
    .loading {
      align-self: flex-start;
      padding: 14px 20px;
      color: #d0d0d0;
      font-size: 16px;
    }
    .loading .dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
    }

    /* ── Input bar ──────────────────────── */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      background: #16213e;
      border-top: 2px solid #0f3460;
    }
    .input-bar input {
      flex: 1;
      padding: 14px 18px;
      background: #1a1a2e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 17px;
      outline: none;
    }
    .input-bar input:focus { border-color: #7ec8e3; }
    .input-bar input::placeholder { color: #c8c8d0; }
    .send-btn {
      background: #238636;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 17px;
      cursor: pointer;
      font-weight: 700;
    }
    .send-btn:hover { background: #2ea043; }
    .send-btn:disabled { background: #2a2a3e; color: #606060; cursor: default; }

    /* ── Welcome message ────────────────── */
    .welcome {
      text-align: center;
      color: #b0b0b0;
      padding: 40px 20px;
    }
    .welcome h3 { color: #e0e0e0; margin-bottom: 12px; font-size: 20px; }
    .welcome p { font-size: 16px; line-height: 2; color: #d0d0d0; }

    /* ── Readme modal ──────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal-content {
      background: #1a1a2e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      max-width: 800px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 32px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      color: #e0e0e0;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close:hover { color: #7ec8e3; }
    .modal-content h1 { font-size: 24px; color: #7ec8e3; margin: 16px 0 8px; }
    .modal-content h2 { font-size: 20px; color: #7ec8e3; margin: 14px 0 6px; }
    .modal-content h3 { font-size: 17px; color: #7ec8e3; margin: 12px 0 4px; }
    .modal-content p { color: #e0e0e0; line-height: 1.7; margin: 6px 0; font-size: 15px; }
    .modal-content ul, .modal-content ol { padding-left: 22px; margin: 6px 0; color: #e0e0e0; }
    .modal-content li { margin: 4px 0; line-height: 1.6; font-size: 15px; }
    .modal-content code {
      background: #16213e;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 14px;
      color: #e0e0e0;
    }
    .modal-content pre {
      background: #16213e;
      padding: 14px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .modal-content pre code { padding: 0; background: none; }
    .modal-content strong { color: #7ec8e3; }
    .modal-content a { color: #7ec8e3; text-decoration: underline; }
    .modal-content table { width: 100%; border-collapse: collapse; margin: 8px 0; }
    .modal-content th, .modal-content td {
      border: 1px solid #0f3460;
      padding: 8px 12px;
      text-align: left;
      color: #e0e0e0;
      font-size: 14px;
    }
    .modal-content th { background: #16213e; font-weight: 600; }
  </style>
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="login-screen" style="display:none">
    <h2>Homey Chat</h2>
    <p>Control your smart home with natural language</p>
    <button class="login-btn" onclick="location.href='/auth/login'">Login with Homey</button>
  </div>

  <!-- Chat screen -->
  <div id="chat-screen" style="display:none">
    <header>
      <div class="header-left">
        <h1><span>Homey Chat</span></h1>
        <div class="header-info" id="header-info"></div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="logout-btn" onclick="showReadme()">Readme</button>
        <button class="logout-btn" onclick="resetChat()">New chat</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </header>
    <div class="chat-container">
      <div class="messages" id="messages">
        <div class="welcome">
          <h3>Ask anything about your smart home</h3>
          <p>
            "Which lights are on?"<br>
            "Set the hallway to 30%"<br>
            "Show all temperatures"<br>
            "Turn off everything in the garage"
          </p>
        </div>
      </div>
      <div class="input-bar">
        <input type="text" id="input" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" id="send-btn" onclick="send()">Send</button>
      </div>
    </div>
  </div>

  <!-- Readme modal -->
  <div class="modal-overlay" id="readme-modal" onclick="closeReadme(event)">
    <div class="modal-content" id="readme-content">
      <button class="modal-close" onclick="closeReadme()">&times;</button>
      <div id="readme-body">Loading...</div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    // ── Init ──────────────────────────────────────────
    async function init() {
      try {
        const res = await fetch('/api/session');
        const data = await res.json();
        if (data.loggedIn) {
          const info = document.getElementById('header-info');
          const parts = [];
          if (data.version) parts.push(`v${data.version}`);
          if (data.model) parts.push(data.model);
          const status = data.homeyConnected ? 'connected' : 'connecting...';
          if (data.homeyAddress) parts.push(`${data.homeyAddress} [${status}]`);
          info.textContent = parts.join('  ·  ');
          showChat();
        } else {
          showLogin();
        }
      } catch {
        showLogin();
      }
    }

    function showLogin() {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('chat-screen').style.display = 'none';
    }

    function showChat() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      document.getElementById('chat-screen').style.flexDirection = 'column';
      document.getElementById('chat-screen').style.height = '100vh';
      inputEl.focus();
    }

    // ── Send message ──────────────────────────────────
    async function send() {
      const message = inputEl.value.trim();
      if (!message) return;

      // Clear welcome on first message
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();

      addMessage('user', message);
      inputEl.value = '';
      inputEl.disabled = true;
      sendBtn.disabled = true;

      // Show loading
      const loadingEl = document.createElement('div');
      loadingEl.className = 'loading';
      loadingEl.innerHTML = 'Thinking<span class="dots"></span>';
      messagesEl.appendChild(loadingEl);
      scrollToBottom();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });

        if (res.status === 401) {
          showLogin();
          return;
        }

        const data = await res.json();
        loadingEl.remove();

        if (data.error) {
          addMessage('assistant', `Error: ${data.error}`);
        } else {
          addMessage('assistant', data.reply);
        }
      } catch (err) {
        loadingEl.remove();
        addMessage('assistant', 'Connection error. Please try again.');
      } finally {
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    // ── Render message ────────────────────────────────
    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;

      if (role === 'assistant') {
        div.innerHTML = marked.parse(content);
      } else {
        div.textContent = content;
      }

      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Reset chat ─────────────────────────────────────
    async function resetChat() {
      await fetch('/api/chat/reset', { method: 'POST' });
      messagesEl.innerHTML = `
        <div class="welcome">
          <h3>Ask anything about your smart home</h3>
          <p>
            "Which lights are on?"<br>
            "Set the hallway to 30%"<br>
            "Show all temperatures"<br>
            "Turn off everything in the garage"
          </p>
        </div>`;
      inputEl.focus();
    }

    // ── Logout ────────────────────────────────────────
    async function logout() {
      await fetch('/auth/logout', { method: 'POST' });
      showLogin();
    }

    // ── Keyboard ──────────────────────────────────────
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // ── Readme modal ────────────────────────────────
    async function showReadme() {
      const modal = document.getElementById('readme-modal');
      const body = document.getElementById('readme-body');
      modal.classList.add('open');
      body.innerHTML = 'Loading...';
      try {
        const res = await fetch('/api/readme');
        const data = await res.json();
        if (data.content) {
          body.innerHTML = marked.parse(data.content);
        } else {
          body.innerHTML = '<p>README not available.</p>';
        }
      } catch {
        body.innerHTML = '<p>Failed to load README.</p>';
      }
    }

    function closeReadme(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('readme-modal').classList.remove('open');
    }

    // Boot
    init();
  </script>
</body>
</html>
