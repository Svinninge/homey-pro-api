services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: homey-tailscale
    hostname: homey-chat
    env_file:
      - .env.local
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_SERVE_CONFIG=/config/tailscale-serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale-serve.json:/config/tailscale-serve.json:ro
    restart: unless-stopped

  homey-chat:
    build: .
    container_name: homey-chat
    network_mode: "service:tailscale"
    env_file:
      - .env.local
    environment:
      - WEB_PORT=3000
      - TOKEN_FILE_PATH=/app/data/tokens.json
      - SESSION_SECRET=change-me-to-a-random-string
      - BASE_URL=  # Set to https://<hostname>.ts.net in .env.local
    volumes:
      - ./data:/app/data
    depends_on:
      - tailscale
    restart: unless-stopped

volumes:
  tailscale-state:
